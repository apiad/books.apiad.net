<!DOCTYPE html>
<html lang="en">
<head><link href="/books/reader.css" rel="stylesheet"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Computist Library</title>
<link href="/manifest.json" rel="manifest"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<script src="/sw-register.js"></script>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #0f0f0f;
      color: #fafafa;
      min-height: 100vh;
      padding: 24px 16px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(to right, #f97316, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header p {
      color: #71717a;
      font-size: 14px;
    }
    
    .books {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .book-card {
      display: flex;
      gap: 16px;
      background: #1a1a1a;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, border-color 0.2s;
    }
    
    .book-card:hover {
      transform: scale(1.02);
      border-color: #3f3f46;
    }
    
    .book-card:active {
      transform: scale(0.98);
    }
    
    .book-cover {
      width: 60px;
      height: 80px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }
    
    .book-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .book-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .book-description {
      font-size: 13px;
      color: #a1a1aa;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .book-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #71717a;
      margin-top: 8px;
    }
    
    .progress-bar {
      height: 3px;
      background: #27272a;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, #f97316, #8b5cf6);
      border-radius: 2px;
    }
    
    .read-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 12px;
      background: #8b5cf6;
      color: white;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      text-align: center;
    }
    
    .footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #27272a;
      color: #52525b;
      font-size: 12px;
    }
    
    .footer a {
      color: #8b5cf6;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="header">
<h1>The Computist Library</h1>
<p>Read online for free</p>
</div>
<div class="books" id="books-container"></div>
<div class="footer">
<p>Built with ❤️ by <a href="https://apiad.net">Alejandro Piad</a></p>
<p style="margin-top: 8px;">100% free to read online</p>
</div>
<script>
    (function() {
      var container = document.getElementById('books-container');
      var categories = window.catalogData ? window.catalogData.categories : [];
      
      var booksHtml = '';
      
      for (var c = 0; c < categories.length; c++) {
        var items = categories[c].items || [];
        for (var i = 0; i < items.length; i++) {
          var book = items[i];
          
          // Skip books without readUrl (like compendium)
          if (!book.readUrl) continue;
          
          // Skip compendium
          if (book.id === 'compendium') continue;
          
          var coverHtml = book.coverUrl 
            ? '<img src="' + book.coverUrl + '" alt="' + book.title + '" class="book-cover">'
            : '<div class="book-cover" style="background: linear-gradient(135deg, #f97316, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 24px;">📚</div>';
          
          var link = book.readUrl + '/index.html';
          var progress = book.progress || 0;
          
          booksHtml += 
            '<a href="' + link + '" class="book-card">' +
              coverHtml +
              '<div class="book-info">' +
                '<div class="book-title">' + book.title + '</div>' +
                '<div class="book-description">' + book.description + '</div>' +
                '<span class="book-status">' + (book.statusEmoji || '') + ' ' + (book.status || '') + ' · ' + progress + '%</span>' +
                '<div class="progress-bar"><div class="progress-fill" style="width: ' + progress + '%"></div></div>' +
                '<span class="read-btn">Read</span>' +
              '</div>' +
            '</a>';
        }
      }
      
      container.innerHTML = booksHtml;
    })();
  </script>
<script src="/data.js"></script><script src="/books/reader.js"></script></body>
</html>
